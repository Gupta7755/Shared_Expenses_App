{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Splitly</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom Style -->
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body class="auth-page">
    <a href="{% url 'splitly:landing' %}" class="auth-logo">
        <div class="logo-icon">
            <i class="bi bi-wallet2"></i>
        </div>
        <span>Splitly</span>
    </a>

    <div class="auth-card">
        <h2 class="auth-title">Welcome back</h2>
        <p class="auth-subtitle">Log in to manage your shared expenses.</p>

        <!-- Django messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}info{% endif %} shadow-sm" role="alert" style="font-size: 13px; padding: 10px;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label" for="emailInput">Email</label>
                <input type="email" name="email" id="emailInput" class="form-control" placeholder="demo@share.app" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label" for="passwordInput">Password</label>
                <input type="password" name="password" id="passwordInput" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary-custom w-100 justify-content-center py-2 mt-2" style="border-radius: 8px;">Log in</button>
        </form>

        <p class="text-center text-muted mt-4" style="font-size: 14px;">
            Don't have an account? <a href="{% url 'splitly:signup' %}" class="text-primary text-decoration-none fw-semibold">Sign up</a>
        </p>

        <div class="demo-account-box">
            <span class="fw-bold text-dark">Demo:</span> demo@share.app / demo1234
        </div>
    </div>
</body>
</html>
